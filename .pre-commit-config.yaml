repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-llvm-cov
        name: cargo llvm-cov (tests + 70% coverage gate)
        description: Run tests with coverage — fail if line coverage < 70%. Produces lcov.info.
        entry: bash -c 'scripts/coverage-gate.sh 70 2>&1'
        language: system
        pass_filenames: false
        verbose: true

  # knots complexity gate. The default `knots` hook ships args
  # [--aird-threshold=85], so no override is needed here. To tighten or add
  # metrics, set `args:` (pre-commit replaces them wholesale), e.g.
  #   args: [--aird-threshold=85, --cognitive-threshold=20]
  # ws_before is a whitespace-policy dispatch table mirroring funky's full
  # formatter logic; AIRD ~92 is expected and acceptable for this function.
  - repo: https://github.com/brandon-arrendondo/knots
    rev: v1.10.0
    hooks:
      - id: knots
        types: [rust]
        args: [--aird-threshold=95]
