# Linux kernel coding style
# https://www.kernel.org/doc/html/latest/process/coding-style.html
#
# Tabs (width 8), K&R braces with cuddled else, un-indented switch/case,
# and no braces forced onto single-statement if/for/while bodies.

[indent]
style = "tabs"
width = 8
indent_switch_case = false
indent_goto_labels = false

[braces]
style = "kr"
cuddle_else = true
cuddle_catch = true
collapse_empty_body = true
expand_large_initializers = false
fn_brace_newline = true
extern_c_brace = "force_same_line"
add_braces_to_if = false
add_braces_to_while = false
add_braces_to_for = false

[spacing]
space_before_call_paren = false
space_before_keyword_paren = true
space_after_comma = true
space_around_binary_ops = true
space_inside_parens = "remove"
space_inside_brackets = "remove"
space_after_cast = "remove"
pointer_align = "name"
space_inside_angle_brackets = false
align_right_cmt_span = 3
align_right_cmt_gap = 1
align_right_cmt_style = "groups"
align_enum_equ_span = 1
align_doxygen_cmt_span = 1
align_on_tabstop = true

[newlines]
style = "lf"
max_blank_lines = 1
final_newline = true
blank_line_after_var_decl_block = true
blank_line_after_open_brace = false
merge_line_comment = false
nl_brace_else = false

[preprocessor]
pp_indent = false
pp_indent_at_level = false
endif_comment_space = 1

[comments]
normalize_block_comment_closing = false
